<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
  <meta name="theme-color" content="#ffffff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="MedSearch 2026">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.svg">
  <meta name="viewport" content="width=device-width,initial-scale=1">
<title>India PG Medical College Search 2026</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f4f4f4;color:#1a1a1a;min-height:100vh}
.page{max-width:920px;margin:0 auto;padding:28px 20px}
h1{font-size:22px;font-weight:500;margin-bottom:4px}
.subtitle{font-size:13px;color:#aaa;margin-bottom:24px}
/* Search bar */
.sbar{position:relative;margin-bottom:18px}
.sbar input{width:100%;height:48px;padding:0 48px 0 18px;font-size:15px;border:1.5px solid #ddd;border-radius:12px;background:#fff;outline:none}
.sbar input:focus{border-color:#555}
.sbar-icon{position:absolute;right:16px;top:50%;transform:translateY(-50%);color:#ccc;font-size:20px;pointer-events:none}
/* Filter card */
.fcard{background:#fff;border-radius:12px;border:1px solid #e8e8e8;padding:20px;margin-bottom:18px}
.sec-hdr{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#bbb;padding-bottom:8px;border-bottom:1px solid #f0f0f0;margin-bottom:14px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.fg{display:flex;flex-direction:column;gap:5px}
.fg label{font-size:11px;font-weight:600;color:#aaa;letter-spacing:.02em}
select{width:100%;height:38px;padding:0 10px;font-size:13px;border:1.5px solid #e8e8e8;border-radius:8px;background:#fff;color:#1a1a1a;cursor:pointer;outline:none}
select:focus{border-color:#888}
select:disabled{opacity:.4;cursor:default}
.static-badge{height:38px;border:1.5px solid #e8e8e8;border-radius:8px;background:#fafafa;display:flex;align-items:center;padding:0 12px;font-size:13px;color:#555;gap:8px}
.static-badge span{font-size:11px;color:#bbb}
/* Spec search */
.spec-wrap{position:relative}
.spec-row{display:flex;align-items:center;min-height:38px;border:1.5px solid #e8e8e8;border-radius:8px;background:#fff;padding:4px 8px;gap:4px;flex-wrap:wrap;cursor:text}
.spec-row:focus-within{border-color:#888}
.spec-row input{flex:1;min-width:120px;border:none;outline:none;font-size:13px;background:transparent;color:#1a1a1a;padding:2px 4px}
.spec-pill{display:inline-flex;align-items:center;gap:4px;background:#e8f0fe;border-radius:6px;padding:3px 8px;font-size:11px;font-weight:500;color:#1a56b0;white-space:nowrap;max-width:220px}
.spec-pill-txt{overflow:hidden;text-overflow:ellipsis}
.spec-x{cursor:pointer;font-size:13px;color:#1a56b0;line-height:1;padding:0 2px;flex-shrink:0}
.spec-x:hover{color:#c00}
.spec-dd{position:absolute;top:calc(100% + 4px);left:0;right:0;background:#fff;border:1.5px solid #e0e0e0;border-radius:10px;box-shadow:0 6px 20px rgba(0,0,0,.09);z-index:300;max-height:300px;overflow-y:auto;display:none}
.spec-dd.open{display:block}
.spec-ghdr{padding:8px 12px 4px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#bbb;background:#fff;border-bottom:1px solid #f5f5f5;position:sticky;top:0}
.spec-opt{padding:7px 14px;font-size:13px;color:#333;cursor:pointer}
.spec-opt:hover,.spec-opt.hi{background:#f5f5f5}
.spec-opt.sel{color:#1a56b0;font-weight:500}
.spec-nores{padding:14px;font-size:13px;color:#bbb;text-align:center}
/* Tags */
.tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:14px;padding-top:12px;border-top:1px solid #f2f2f2;align-items:center}
.tag{font-size:11px;background:#f5f5f5;border:1px solid #e8e8e8;border-radius:99px;padding:3px 10px;color:#555}
.tag b{color:#bbb;font-weight:400;margin-right:3px}
.btn-reset{font-size:12px;padding:5px 12px;border-radius:8px;border:1.5px solid #e0e0e0;background:#fff;color:#888;cursor:pointer;margin-left:auto}
/* Results */
.rcount{font-size:12px;color:#aaa;margin-bottom:12px}
.empty{text-align:center;padding:48px;color:#ccc;font-size:14px}
/* College card */
.ccard{background:#fff;border-radius:12px;border:1px solid #e8e8e8;margin-bottom:10px;overflow:hidden;transition:border-color .15s;cursor:pointer}
.ccard:hover{border-color:#bbb}
.ccard.open{border:1.5px solid #333;cursor:default}
.ch{padding:14px 18px;display:flex;justify-content:space-between;align-items:flex-start;gap:12px;cursor:pointer}
.ccard.open .ch{cursor:pointer}
.ctitle{font-size:15px;font-weight:500;margin-bottom:3px}
.csub{font-size:12px;color:#888}
.cbadges{display:flex;gap:5px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end}
.badge{font-size:11px;padding:3px 8px;border-radius:6px;font-weight:500;white-space:nowrap}
.b-blue{background:#e8f0fe;color:#1a56b0}
.b-green{background:#e6f4ea;color:#1e6b37}
.b-amber{background:#fef3e2;color:#9c5700}
.b-purple{background:#f3e8fd;color:#6b1fb1}
.b-red{background:#fce8e6;color:#c5221f}
.b-grey{background:#f0f0f0;color:#666}
/* Detail panel */
.cdetail{display:none;padding:0 18px 22px;border-top:1px solid #f5f5f5}
.cdetail.open{display:block}
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:16px 0}
.mbox{background:#f9f9f9;border-radius:8px;padding:10px 12px;text-align:center}
.mval{font-size:14px;font-weight:500;line-height:1.3;margin-bottom:3px}
.mkey{font-size:10px;color:#aaa;text-transform:uppercase;letter-spacing:.05em}
.det2{display:grid;grid-template-columns:1fr 1fr;gap:0 28px}
.dsec{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#bbb;margin:18px 0 8px;padding-bottom:6px;border-bottom:1px solid #f0f0f0}
.dr{display:flex;gap:10px;padding:5px 0;border-bottom:1px solid #fafafa;align-items:flex-start}
.dr:last-child{border:none}
.dk{font-size:11px;color:#aaa;font-weight:500;min-width:120px;flex-shrink:0;padding-top:1px;line-height:1.4}
.dv{font-size:12px;color:#333;line-height:1.5}
/* Specializations in detail */
.spec-section{margin-top:20px;padding-top:16px;border-top:1px solid #f0f0f0}
.spec-sec-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#bbb;margin-bottom:12px}
.spec-raw{background:#fafafa;border:1px solid #f0f0f0;border-radius:8px;padding:12px 14px;font-size:12px;color:#555;line-height:1.7;margin-bottom:14px}
.spec-raw b{font-size:10px;color:#aaa;display:block;margin-bottom:4px;font-weight:600;text-transform:uppercase;letter-spacing:.05em}
.spec-active-pill{background:#e8f4fd;border:1px solid #c5daf6;border-radius:8px;padding:10px 14px;margin-bottom:12px;font-size:12px;color:#1a56b0}
.spec-active-pill b{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:3px}
.sdeg-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.sdeg{border:1px solid #ebebeb;border-radius:8px;overflow:hidden}
.sdeg-hdr{padding:7px 12px;font-size:11px;font-weight:600;display:flex;justify-content:space-between;align-items:center;border-radius:0}
.sdeg-cnt{font-size:10px;font-weight:400;opacity:.75}
.sgrp-name{padding:5px 12px 3px;font-size:10px;font-weight:600;color:#aaa;text-transform:uppercase;letter-spacing:.06em;background:#fafafa;border-top:1px solid #f0f0f0}
.sitem{padding:5px 12px;font-size:11px;color:#444;border-top:1px solid #f8f8f8;line-height:1.4}
.sitem.match{background:#e8f0fe;color:#1a56b0;font-weight:500}
</style>
</head>
<body>
<div class="page">
  <div id="install-banner" style="display:none;background:#1a56b0;color:#fff;border-radius:12px;padding:14px 18px;margin-bottom:18px;display:none;align-items:center;justify-content:space-between;gap:12px;">
    <div>
      <div style="font-size:14px;font-weight:500;margin-bottom:2px;">Install this app</div>
      <div style="font-size:12px;opacity:.8;">Add to home screen for offline access</div>
    </div>
    <div style="display:flex;gap:8px;flex-shrink:0">
      <button id="install-btn" style="background:#fff;color:#1a56b0;border:none;border-radius:8px;padding:7px 16px;font-size:13px;font-weight:600;cursor:pointer;">Install</button>
      <button onclick="document.getElementById('install-banner').style.display='none'" style="background:rgba(255,255,255,.2);color:#fff;border:none;border-radius:8px;padding:7px 10px;font-size:13px;cursor:pointer;">✕</button>
    </div>
  </div>

  <h1>India PG Medical College Search 2026</h1>
  <p class="subtitle">177 colleges &middot; NEET PG &middot; INI-CET &middot; NEET MDS &middot; NEET SS &middot; NMC Seat Matrix 2025-26</p>

  <div class="sbar">
    <input type="text" id="txt" placeholder="Search college, city or state&hellip;" oninput="onSearch()">
    <span class="sbar-icon">&#128269;</span>
  </div>

  <div class="fcard">
    <div style="display:flex;align-items:center;margin-bottom:16px">
      <span style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#bbb">Filters</span>
      <button class="btn-reset" id="btn-reset" onclick="resetAll()" style="display:none">Reset all</button>
    </div>

    <!-- COURSE -->
    <div style="margin-bottom:20px">
      <div class="sec-hdr">Course</div>
      <div class="grid2" style="margin-bottom:12px">
        <div class="fg">
          <label>Course level</label>
          <div class="static-badge">PG <span>Postgraduate</span></div>
        </div>
        <div class="fg">
          <label>Degree</label>
          <select id="f-degree" onchange="onDegreeChange()">
            <option value="">— All degrees —</option>
            <option value="MD">MD — Doctor of Medicine (33)</option>
            <option value="MS">MS — Master of Surgery (7)</option>
            <option value="MDS">MDS — Master of Dental Surgery (9)</option>
            <option value="Diploma">PG Diploma (23)</option>
            <option value="DNB">DNB — Diplomate of National Board (29)</option>
          </select>
        </div>
      </div>
      <div class="fg" id="fg-spec">
        <label>Specialization</label>
        <div class="spec-wrap" id="spec-wrap">
          <div class="spec-row" onclick="focusSpecInput()">
            <span id="spec-pill-slot"></span>
            <input type="text" id="spec-txt" placeholder="Type to search specializations&hellip;"
              autocomplete="off" oninput="onSpecInput()" onfocus="openSpecDD()">
          </div>
          <div class="spec-dd" id="spec-dd"></div>
        </div>
      </div>
    </div>

    <!-- INSTITUTION -->
    <div style="margin-bottom:20px">
      <div class="sec-hdr">Institution</div>
      <div class="grid2" style="margin-bottom:12px">
        <div class="fg">
          <label>Institution type</label>
          <select id="f-inst" onchange="onInstChange()">
            <option value="">— All —</option>
            <option value="cn">Central and National</option>
            <option value="state">State</option>
          </select>
        </div>
        <div class="fg">
          <label>College type</label>
          <select id="f-ctype" onchange="onCtypeChange()"><option value="">— All —</option></select>
        </div>
      </div>
      <div class="fg" id="fg-cat" style="display:none">
        <label>College category</label>
        <select id="f-cat" onchange="onCatChange()"><option value="">— All categories —</option></select>
      </div>
    </div>

    <!-- LOCATION -->
    <div>
      <div class="sec-hdr">Location &amp; College</div>
      <div class="grid3">
        <div class="fg"><label>State</label>
          <select id="f-state" onchange="onStateChange()"><option value="">— All —</option></select>
        </div>
        <div class="fg"><label>City</label>
          <select id="f-city" onchange="onCityChange()"><option value="">— All —</option></select>
        </div>
        <div class="fg"><label>College name</label>
          <select id="f-college" onchange="onCollegeSelect()"><option value="">— All —</option></select>
        </div>
      </div>
    </div>

    <div class="tags" id="tag-bar" style="display:none"></div>
  </div>

  <div class="rcount" id="rcount"></div>
  <div id="results"></div>
</div>

    {n:'Super Speciality',items:['Cardiology','Neurology','Nephrology','Gastroenterology','Endocrinology & Metabolism','Pulmonology / Respiratory & Critical Care Medicine','Haematology','Medical Oncology','Hepatology','Neonatology','Paediatric Cardiology','Paediatric Neurology','Clinical Pharmacology','Clinical Immunology & Rheumatology','Allergy & Clinical Immunology','Infectious Diseases','Medical Genetics','Geriatric Medicine','Reproductive Medicine','Critical Care Medicine']}
  ]},

    {n:'Super Speciality',items:['Cardiothoracic & Vascular Surgery','Neurosurgery','Urology & Renal Transplantation','Plastic & Reconstructive Surgery','Paediatric Surgery','Surgical Oncology','Vascular Surgery','Hand Surgery & Microsurgery','Minimal Access Surgery','Burns, Plastic & Maxillofacial Surgery','Reproductive Medicine & Surgery','Head & Neck Surgery','Endocrine Surgery','Hepatobiliary & GI Surgery','Gynaecological Oncology','Thoracic Surgery','Trauma Surgery']}
  ]}

const EXAM_DEG = {
  'NEET PG 2026':['MD','MS','Diploma','DNB'],
  'INI-CET July 2026 (for July session)':['MD','MS','MDS','DM','MCh'],
  'NEET MDS 2026':['MDS'],
  'NEET SS 2026':['DM','MCh']
};

let S = {degree:'',spec:'',inst:'',ctype:'',cat:'',state:'',city:'',college:'',search:''};
let activeIdx = -1;

// ── Filtering ────────────────────────────────────
function getFiltered() {
  return RAW.filter(r => {
    if (S.search) {
      const q = S.search.toLowerCase();
      if (!((r['College Name']||'').toLowerCase().includes(q)
         || (r['City']||'').toLowerCase().includes(q)
         || (r['State']||'').toLowerCase().includes(q))) return false;
    }
    if (S.inst === 'cn'    && !CN_TYPES.includes(r['College Type'])) return false;
    if (S.inst === 'state' &&  CN_TYPES.includes(r['College Type'])) return false;
    if (S.ctype === 'gov'   && !GOV_TYPES.includes(r['College Type'])) return false;
    if (S.ctype === 'pvt'   && !PVT_TYPES.includes(r['College Type'])) return false;
    if (S.ctype === 'deemed'&& !r['College Type'].startsWith('Deemed')) return false;
    if (S.ctype === 'cn'    && !CN_TYPES.includes(r['College Type'])) return false;
    if (S.cat    && r['College Type'] !== S.cat) return false;
    if (S.state  && r['State'] !== S.state) return false;
    if (S.city   && r['City']  !== S.city)  return false;
    if (S.college&& r['College Name'] !== S.college) return false;
    return true;
  });
}

// ── Spec search widget ────────────────────────────
function getSpecGroups() {
  if (S.degree && DS[S.degree]) return DS[S.degree].groups;
  const all = [];
  Object.entries(DS).forEach(([k,v]) => v.groups.forEach(g => all.push({n: k+' — '+g.n, items: g.items})));
  return all;
}

function renderSpecDD(q) {
  const dd = document.getElementById('spec-dd');
  const groups = getSpecGroups();
  const ql = q.toLowerCase();
  let html = '', count = 0;
  groups.forEach(g => {
    const matched = g.items.filter(i => !ql || i.toLowerCase().includes(ql));
    if (!matched.length) return;
    html += '<div class="spec-ghdr">' + g.n + '</div>';
    matched.forEach(item => {
      const isSel = item === S.spec;
      const highlighted = ql
        ? item.replace(new RegExp('(' + ql.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')','gi'),'<b>$1</b>')
        : item;
      html += '<div class="spec-opt' + (isSel?' sel':'') + '" data-val="' + item.replace(/"/g,'&quot;') + '" onmousedown="handleSpecClick(this)">' + highlighted + '</div>';
      count++;
    });
  });
  dd.innerHTML = count ? html : '<div class="spec-nores">No matching specialization</div>';
  dd.classList.add('open');
}

function focusSpecInput() { document.getElementById('spec-txt').focus(); }

function openSpecDD() { renderSpecDD(document.getElementById('spec-txt').value); }

function onSpecInput() { renderSpecDD(document.getElementById('spec-txt').value); }

function handleSpecClick(el) {
  selectSpec(el.getAttribute('data-val'));
}

function selectSpec(val) {
  S.spec = val;
  const slot = document.getElementById('spec-pill-slot');
  slot.innerHTML = '<span class="spec-pill"><span class="spec-pill-txt" title="' + val + '">' + val + '</span><span class="spec-x" onmousedown="clearSpec(event)">&#10005;</span></span>';
  const inp = document.getElementById('spec-txt');
  inp.value = '';
  inp.style.cssText = 'width:0;min-width:0;flex:0';
  document.getElementById('spec-dd').classList.remove('open');
  doRender();
}

function clearSpec(e) {
  if (e) e.preventDefault();
  S.spec = '';
  document.getElementById('spec-pill-slot').innerHTML = '';
  const inp = document.getElementById('spec-txt');
  inp.value = '';
  inp.style.cssText = '';
  document.getElementById('spec-dd').classList.remove('open');
  doRender();
}

document.addEventListener('click', e => {
  const wrap = document.getElementById('spec-wrap');
  if (wrap && !wrap.contains(e.target)) document.getElementById('spec-dd').classList.remove('open');
});

// ── College card render ───────────────────────────
function bclass(ct) {
  if (ct.includes('AIIMS')||ct.includes('INI')) return 'b-blue';
  if (ct.startsWith('Deemed')) return 'b-amber';
  if (ct.includes('Private')) return 'b-purple';
  if (ct.includes('Central')) return 'b-red';
  return 'b-green';
}

function dr(k,v) {
  return '<div class="dr"><span class="dk">'+k+'</span><span class="dv">'+(v||'—')+'</span></div>';
}

function buildSpecBlock(r) {
  const degs = (EXAM_DEG[r.exam] || ['MD','MS']).filter(d => DS[d]);
  const selDeg = S.degree;
  const selSpec = S.spec;
  const toShow = selDeg && DS[selDeg] ? [selDeg] : degs;
  const cols = Math.min(toShow.length, 3);

  let h = '<div class="spec-section">';
  h += '<div class="spec-sec-title">Specializations available at this college</div>';

  if (!selDeg && r['Specializations (PG)']) {
    h += '<div class="spec-raw"><b>From college data</b>' + r['Specializations (PG)'] + '</div>';
  }
  if (selSpec) {
    h += '<div class="spec-active-pill"><b>Selected specialization</b>' + selSpec + '</div>';
  }

  h += '<div class="sdeg-grid" style="grid-template-columns:repeat('+cols+',1fr)">';
  toShow.forEach(dk => {
    const d = DS[dk];
    const total = d.groups.reduce((a,g) => a+g.items.length, 0);
    h += '<div class="sdeg">';
    h += '<div class="sdeg-hdr badge '+d.cls+'" style="border-radius:0"><span>'+d.label+'</span><span class="sdeg-cnt">'+total+' branches</span></div>';
    d.groups.forEach(g => {
      if (d.groups.length > 1) h += '<div class="sgrp-name">'+g.n+'</div>';
      g.items.forEach(item => {
        const isMatch = selSpec && item.toLowerCase().includes(selSpec.toLowerCase());
        h += '<div class="sitem'+(isMatch?' match':'')+'">'+( isMatch ? '&#10003; ' : '')+item+'</div>';
      });
    });
    h += '</div>';
  });
  h += '</div></div>';
  return h;
}

function renderCard(r, idx) {
  const ex = EXAM_DATA[r.exam] || {};
  const isOpen = activeIdx === idx;
  const examShort = (r.exam||'').split(' ').slice(0,2).join(' ');
  return '<div class="ccard'+(isOpen?' open':'')+'" id="card-'+idx+'">'
    + '<div class="ch" onclick="toggle('+idx+')">'
    +   '<div style="flex:1;min-width:0">'
    +     '<div class="ctitle">'+r['College Name']+'</div>'
    +     '<div class="csub">'+r['City']+', '+r['State']+'</div>'
    +   '</div>'
    +   '<div class="cbadges">'
    +     '<span class="badge '+bclass(r['College Type'])+'">'+r['College Type']+'</span>'
    +     '<span class="badge b-grey">'+examShort+'</span>'
    +   '</div>'
    + '</div>'
    + '<div class="cdetail'+(isOpen?' open':'')+'">'
    +   '<div class="metrics">'
    +     '<div class="mbox"><div class="mval">'+(r['PG Seats (approx)']||'—')+'</div><div class="mkey">PG Seats</div></div>'
    +     '<div class="mbox"><div class="mval">'+(ex['No. of Questions']||'—')+'</div><div class="mkey">Questions</div></div>'
    +     '<div class="mbox"><div class="mval">'+(ex['Duration']||'—')+'</div><div class="mkey">Duration</div></div>'
    +     '<div class="mbox"><div class="mval">'+(ex['Exam Fee (General)']||'—')+'</div><div class="mkey">Exam Fee</div></div>'
    +   '</div>'
    +   '<div class="det2">'
    +     '<div>'
    +       '<div class="dsec">College</div>'
    +       dr('Name', r['College Name'])
    +       dr('City', r['City'])
    +       dr('State', r['State'])
    +       dr('Type', r['College Type'])
    +       dr('PG Fee / Year', r['Potential PG Fee / Year'])
    +       dr('PG Seats', r['PG Seats (approx)'])
    +       dr('Admission Route', r['Admission Route'])
    +       dr('Counselling', r['Who Manages Counselling'])
    +     '</div>'
    +     '<div>'
    +       '<div class="dsec">Exam</div>'
    +       dr('Exam', r.exam)
    +       dr('Exam Date', ex['Exam Date'])
    +       dr('Result Date', ex['Result Date'])
    +       dr('Questions', ex['No. of Questions'])
    +       dr('Duration', ex['Duration'])
    +       dr('Session', ex['Session'])
    +       dr('Negative Marking', ex['Negative Marking'])
    +       '<div class="dsec">Registration</div>'
    +       dr('Opens', ex['Registration Opens'])
    +       dr('Closes', ex['Registration Closes'])
    +       dr('City Intimation', ex['City Intimation Slip'])
    +       dr('Admit Card', ex['Admit Card Release'])
    +       dr('Apply at', ex['Application Link'])
    +     '</div>'
    +     '<div>'
    +       '<div class="dsec">Counselling</div>'
    +       dr('MCC AIQ', ex['MCC AIQ Counselling'])
    +       dr('KEA Karnataka', ex['Karnataka KEA Counselling'])
    +     '</div>'
    +     '<div>'
    +       '<div class="dsec">Eligibility</div>'
    +       dr('Age Limit', ex['Age Limit'])
    +       dr('Qualifying %ile', ex['Qualifying Percentile'])
    +       dr('Eligibility', ex['Eligibility'])
    +     '</div>'
    +   '</div>'
    +   buildSpecBlock(r)
    + '</div>'
  + '</div>';
}

function toggle(idx) {
  activeIdx = activeIdx === idx ? -1 : idx;
  doRender();
}

// ── Location repopulate ───────────────────────────
function repop() {
  const pool = getFiltered();
  function opts(arr, cur) {
    return arr.filter(Boolean).sort().map(v => '<option'+(v===cur?' selected':'')+'>'+v+'</option>').join('');
  }
  const uniq = (arr) => [...new Set(arr)];

  const stSel = document.getElementById('f-state');
  const curSt = S.state;
  stSel.innerHTML = '<option value="">— All states —</option>' + opts(uniq(pool.map(r=>r['State'])), curSt);

  const cityPool = S.state ? pool.filter(r=>r['State']===S.state) : pool;
  const citySel = document.getElementById('f-city');
  citySel.innerHTML = '<option value="">— All cities —</option>' + opts(uniq(cityPool.map(r=>r['City'])), S.city);

  const colPool = S.city ? cityPool.filter(r=>r['City']===S.city) : cityPool;
  const colSel = document.getElementById('f-college');
  colSel.innerHTML = '<option value="">— All colleges —</option>' + opts(uniq(colPool.map(r=>r['College Name'])), S.college);
}

// ── Tags ──────────────────────────────────────────
function updateTags() {
  const items = [
    S.degree  && {k:'Degree', v:S.degree},
    S.spec    && {k:'Specialization', v:S.spec},
    S.inst    && {k:'Institution', v:{cn:'Central & National',state:'State'}[S.inst]},
    S.ctype   && {k:'Type', v:{gov:'Government',pvt:'Private',deemed:'Deemed',cn:'Central & National'}[S.ctype]},
    S.cat     && {k:'Category', v:S.cat},
    S.state   && {k:'State', v:S.state},
    S.city    && {k:'City', v:S.city},
    S.college && {k:'College', v:S.college},
  ].filter(Boolean);
  const tb = document.getElementById('tag-bar');
  const rb = document.getElementById('btn-reset');
  tb.style.display = items.length ? 'flex' : 'none';
  rb.style.display = items.length ? 'block' : 'none';
  tb.innerHTML = items.map(t=>'<span class="tag"><b>'+t.k+':</b> '+t.v+'</span>').join('');
}

// ── Main render ───────────────────────────────────
function doRender() {
  const filtered = getFiltered();
  document.getElementById('rcount').textContent = filtered.length + ' college' + (filtered.length!==1?'s':'') + ' found';
  document.getElementById('results').innerHTML = filtered.length
    ? filtered.map((r,i) => renderCard(r,i)).join('')
    : '<div class="empty">No colleges match the selected filters.</div>';
  updateTags();
}

// ── Event handlers ────────────────────────────────
function onSearch() {
  S.search = document.getElementById('txt').value;
  activeIdx = -1;
  doRender();
}

function onDegreeChange() {
  S.degree = document.getElementById('f-degree').value;
  S.spec = '';
  // clear spec pill
  document.getElementById('spec-pill-slot').innerHTML = '';
  const inp = document.getElementById('spec-txt');
  inp.value = ''; inp.style.cssText = '';
  document.getElementById('spec-dd').classList.remove('open');
  activeIdx = -1;
  doRender();
}

function onInstChange() {
  S.inst = document.getElementById('f-inst').value;
  S.ctype = ''; S.cat = ''; S.state = ''; S.city = ''; S.college = '';
  activeIdx = -1;
  const ctSel = document.getElementById('f-ctype');
  const catGrp = document.getElementById('fg-cat');
  if (S.inst === 'cn') {
    ctSel.innerHTML = '<option value="">— All —</option><option value="cn">Central and National</option>';
  } else if (S.inst === 'state') {
    ctSel.innerHTML = '<option value="">— All —</option><option value="gov">Government</option><option value="pvt">Private</option><option value="deemed">Deemed</option>';
  } else {
    ctSel.innerHTML = '<option value="">— All —</option>';
  }
  catGrp.style.display = 'none';
  repop(); doRender();
}

function onCtypeChange() {
  S.ctype = document.getElementById('f-ctype').value;
  S.cat = ''; S.state = ''; S.city = ''; S.college = '';
  activeIdx = -1;
  const cats = {cn:CN_TYPES,gov:GOV_TYPES,pvt:PVT_TYPES,deemed:DEEMED_TYPES}[S.ctype] || [];
  const catSel = document.getElementById('f-cat');
  const catGrp = document.getElementById('fg-cat');
  if (cats.length) {
    catGrp.style.display = 'block';
    catSel.innerHTML = '<option value="">— All categories —</option>' + cats.map(c=>'<option>'+c+'</option>').join('');
  } else {
    catGrp.style.display = 'none';
  }
  repop(); doRender();
}

function onCatChange() {
  S.cat = document.getElementById('f-cat').value;
  S.state = ''; S.city = ''; S.college = '';
  activeIdx = -1;
  repop(); doRender();
}

function onStateChange() {
  S.state = document.getElementById('f-state').value;
  S.city = ''; S.college = '';
  activeIdx = -1;
  repop(); doRender();
}

function onCityChange() {
  S.city = document.getElementById('f-city').value;
  S.college = '';
  activeIdx = -1;
  repop(); doRender();
}

function onCollegeSelect() {
  S.college = document.getElementById('f-college').value;
  activeIdx = -1;
  const f = getFiltered();
  if (f.length === 1) activeIdx = 0;
  doRender();
}

function resetAll() {
  S = {degree:'',spec:'',inst:'',ctype:'',cat:'',state:'',city:'',college:'',search:''};
  activeIdx = -1;
  document.getElementById('txt').value = '';
  ['f-degree','f-inst','f-ctype','f-cat','f-state','f-city','f-college'].forEach(id => {
    const el = document.getElementById(id); if (el) el.value = '';
  });
  document.getElementById('f-ctype').innerHTML = '<option value="">— All —</option>';
  document.getElementById('fg-cat').style.display = 'none';
  document.getElementById('spec-pill-slot').innerHTML = '';
  const inp = document.getElementById('spec-txt'); inp.value=''; inp.style.cssText='';
  document.getElementById('spec-dd').classList.remove('open');
  repop(); doRender();
}

// init
repop();
doRender();
</script>

  });

<script>
let deferredPrompt;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  const banner = document.getElementById('install-banner');
  if (banner) banner.style.display = 'flex';
});
document.getElementById('install-btn')?.addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  deferredPrompt = null;
  document.getElementById('install-banner').style.display = 'none';
});
window.addEventListener('appinstalled', () => {
  document.getElementById('install-banner').style.display = 'none';
});
</script>
